services:
  - type: web
    name: sloth-summarizer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    plan: free
    envVars:
      - key: HF_API_KEY
        sync: false          # Set manually in Render dashboard → Environment
      - key: PYTHON_VERSION
        value: "3.11.0"
